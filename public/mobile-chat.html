<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Chat Support</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #f7f8fc;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      /* Fill screen including safe areas, fallback to 100vh */
      height: 100vh;
      height: -webkit-fill-available;
    }

    /* ── Header ── */
    #hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top, 12px));
      background: var(--c1, #24396D);
      flex-shrink: 0;
    }
    #hdr-ava {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    #hdr-ava img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    #hdr-name { color: #fff; font-size: 15px; font-weight: 700; }
    #hdr-sub  { font-size: 11px; color: rgba(255,255,255,.8); margin-top: 2px;
                display: flex; align-items: center; gap: 4px; }
    #hdr-sub::before { content: ''; width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }

    /* ── Messages ── */
    #msgs {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.bot  {
      background: #fff;
      color: #1f2937;
      border-radius: 18px 18px 18px 4px;
      align-self: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,.09);
    }
    .msg.user {
      background: var(--c1, #24396D);
      color: #fff;
      border-radius: 18px 18px 4px 18px;
      align-self: flex-end;
    }
    .msg.sys  {
      align-self: center;
      font-size: 11px;
      color: #9ca3af;
      max-width: 100%;
      text-align: center;
      padding: 2px 0;
      background: none;
    }

    /* Typing dots */
    .dots {
      display: flex; gap: 5px; align-items: center;
      padding: 12px 14px;
      background: #fff;
      border-radius: 18px 18px 18px 4px;
      align-self: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,.09);
    }
    .dots span {
      width: 7px; height: 7px; background: #bbb;
      border-radius: 50%;
      animation: dot 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot {
      0%,80%,100% { transform: scale(.8); opacity: .5; }
      40%          { transform: scale(1.2); opacity: 1; }
    }

    /* Live chat CTA */
    #live-cta {
      display: none;
      margin: 0 12px 4px;
      padding: 13px 16px;
      background: var(--c1, #24396D);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center;
      flex-shrink: 0;
    }

    /* ── Footer input ── */
    #ftr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
      background: #fff;
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    #inp {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14px;
      background: #f9fafb;
      color: #111;
      font-family: inherit;
      outline: none;
      transition: border .2s;
    }
    #inp:focus { border-color: var(--c1, #24396D); }
    #inp:disabled { opacity: .6; }
    #snd {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--c1, #24396D);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .2s;
    }
    #snd:disabled { opacity: .4; cursor: default; }
  </style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div id="hdr-ava"></div>
    <div>
      <div id="hdr-name">Support</div>
      <div id="hdr-sub">AI Assistant · Online now</div>
    </div>
  </div>

  <div id="msgs"></div>

  <button id="live-cta">💬 Talk to a Human Agent</button>

  <div id="ftr">
    <input id="inp" type="text" placeholder="Ask me anything..." maxlength="500" disabled />
    <button id="snd" disabled aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function () {
  /* ── Config from URL params ── */
  var p = new URLSearchParams(location.search);
  function g(k, d) { return p.get(k) || d || ''; }
  var cfg = {
    partnerId: g('partner_id'),
    api:       g('api'),
    name:      g('name', 'Support'),
    avatar:    g('avatar', '?'),
    logo:      g('logo'),
    c1:        g('color_from', '#24396D'),
  };

  /* Apply brand color */
  document.documentElement.style.setProperty('--c1', cfg.c1);
  document.querySelector('#snd').style.background = cfg.c1;

  /* Header */
  document.querySelector('#hdr-name').textContent = cfg.name;
  var ava = document.querySelector('#hdr-ava');
  if (cfg.logo) {
    var img = document.createElement('img');
    img.src = cfg.logo; img.alt = cfg.name;
    ava.appendChild(img);
  } else {
    ava.textContent = (cfg.avatar !== '?' ? cfg.avatar : cfg.name.charAt(0).toUpperCase()) || '?';
  }

  /* ── State ── */
  var aiHistory  = [];
  var busy       = false;
  var step       = 'ai'; /* ai | ask_name | ask_contact | live */
  var visName    = '';
  var visContact = '';
  var chatId     = null;
  var pollTimer  = null;
  var pollSince  = null;
  var msgShown   = 0;   /* number of full exchanges */

  /* ── DOM ── */
  var msgsEl  = document.querySelector('#msgs');
  var inpEl   = document.querySelector('#inp');
  var sndEl   = document.querySelector('#snd');
  var liveBtn = document.querySelector('#live-cta');

  /* ── Helpers ── */
  function scrollEnd() { msgsEl.scrollTop = msgsEl.scrollHeight; }

  function addMsg(text, cls) {
    var d = document.createElement('div');
    d.className = 'msg ' + cls;
    d.textContent = text;
    msgsEl.appendChild(d);
    scrollEnd();
    return d;
  }

  function setReady(on) {
    busy = !on;
    inpEl.disabled = !on;
    sndEl.disabled = !on;
  }

  function showDots() {
    var d = document.createElement('div');
    d.className = 'dots';
    d.innerHTML = '<span></span><span></span><span></span>';
    msgsEl.appendChild(d);
    scrollEnd();
    return d;
  }

  function botSay(text, ms) {
    return new Promise(function (ok) {
      var d = showDots();
      setTimeout(function () { d.remove(); addMsg(text, 'bot'); ok(); }, ms || 800);
    });
  }

  /* ── Boot: greeting ── */
  botSay('Hi! I\'m the AI assistant for ' + cfg.name + '. How can I help you today?')
    .then(function () { setReady(true); });

  /* ── AI chat ── */
  function sendAI(text) {
    addMsg(text, 'user');
    inpEl.value = '';
    setReady(false);
    var snap = aiHistory.slice();
    aiHistory.push({ role: 'user', content: text });

    var d = showDots();
    fetch(cfg.api + '/ai-chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ partner_id: cfg.partnerId, message: text, history: snap }),
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      d.remove();
      var reply = data.reply || 'Sorry, I couldn\'t process that.';
      aiHistory.push({ role: 'assistant', content: reply });
      addMsg(reply, 'bot');
      msgShown++;
      setReady(true);
      /* Show "Talk to human" after 2 exchanges or if AI says so */
      if (data.collect_info || msgShown >= 2) {
        liveBtn.style.display = 'block';
      }
    })
    .catch(function () {
      d.remove();
      addMsg('Something went wrong. Please try again.', 'bot');
      setReady(true);
    });
  }

  /* ── Live chat flow ── */
  liveBtn.addEventListener('click', function () {
    liveBtn.style.display = 'none';
    step = 'ask_name';
    setReady(false);
    botSay('Great! I\'ll connect you with a live agent.\n\nFirst, what\'s your name?')
      .then(function () { setReady(true); inpEl.placeholder = 'Your name…'; });
  });

  function startLiveChat() {
    setReady(false);
    var d = showDots();
    fetch(cfg.api + '/live-chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        action:          'start',
        partner_id:      cfg.partnerId,
        visitor_name:    visName,
        visitor_contact: visContact,
        initial_message: aiHistory.length ? aiHistory[aiHistory.length - 1].content : '',
        ai_history:      aiHistory,
      }),
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      d.remove();
      chatId = data.chat_id;
      step   = 'live';
      addMsg('You\'re connected! An agent will reply shortly.', 'sys');
      inpEl.placeholder = 'Message the agent…';
      setReady(true);
      pollTimer = setInterval(poll, 3000);
    })
    .catch(function () {
      d.remove();
      addMsg('Could not connect. Please try again.', 'sys');
      step = 'ai';
      inpEl.placeholder = 'Ask me anything…';
      setReady(true);
      liveBtn.style.display = 'block';
    });
  }

  function sendToAgent(text) {
    addMsg(text, 'user');
    inpEl.value = '';
    fetch(cfg.api + '/live-chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action: 'message', chat_id: chatId, content: text, visitor_name: visName }),
    }).catch(function () {});
  }

  function poll() {
    if (!chatId) return;
    var url = cfg.api + '/live-chat?action=poll&chat_id=' + chatId;
    if (pollSince) url += '&since=' + encodeURIComponent(pollSince);
    fetch(url)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data.messages || !data.messages.length) return;
        data.messages.forEach(function (m) {
          addMsg((m.sender_name || 'Agent') + ': ' + m.content, 'bot');
        });
        pollSince = data.messages[data.messages.length - 1].created_at;
      })
      .catch(function () {});
  }

  /* ── Main send handler ── */
  function onSend() {
    var txt = inpEl.value.trim();
    if (!txt || busy) return;

    if (step === 'ai') {
      sendAI(txt);
    } else if (step === 'ask_name') {
      visName = txt;
      addMsg(txt, 'user');
      inpEl.value = '';
      step = 'ask_contact';
      setReady(false);
      botSay('Thanks, ' + visName + '! What\'s your phone number or email?')
        .then(function () { setReady(true); inpEl.placeholder = 'Phone or email…'; });
    } else if (step === 'ask_contact') {
      visContact = txt;
      addMsg(txt, 'user');
      inpEl.value = '';
      startLiveChat();
    } else if (step === 'live') {
      sendToAgent(txt);
    }
  }

  sndEl.addEventListener('click', onSend);
  inpEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') onSend(); });
})();
</script>
</body>
</html>
