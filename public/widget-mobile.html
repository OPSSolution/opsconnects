<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OPSConnect Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f7f8fc; }

    /* Make the widget fill the entire screen */
    #_oc_widget_root {
      position: fixed !important;
      inset: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: stretch !important;
    }

    /* Hide the floating toggle button */
    #_ocw_btn { display: none !important; }

    /* Expand panel to full screen */
    #_ocw_panel,
    #_ocw_panel.open {
      display: flex !important;
      width: 100vw !important;
      max-width: 100vw !important;
      height: 100vh !important;
      max-height: 100vh !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      position: fixed !important;
      inset: 0 !important;
    }

    /* Replace close button behaviour — sends message to React Native */
    #_ocw_close { display: flex !important; }
  </style>
</head>
<body>
<script>
(function () {
  var p = new URLSearchParams(window.location.search);
  function g(k, d) { return p.get(k) || d || ''; }

  // Build and inject widget script tag
  var s = document.createElement('script');
  s.setAttribute('data-partner-id',  g('partner_id'));
  s.setAttribute('data-name',        g('name', 'Support'));
  s.setAttribute('data-avatar',      g('avatar', '?'));
  s.setAttribute('data-logo',        g('logo'));
  s.setAttribute('data-color-from',  g('color_from', '#24396D'));
  s.setAttribute('data-color-to',    g('color_to',   '#38BDEB'));
  s.setAttribute('data-api',         g('api'));
  s.setAttribute('data-lang',        g('lang'));
  s.setAttribute('data-messenger',   g('messenger'));
  s.setAttribute('data-whatsapp',    g('whatsapp'));
  s.setAttribute('data-telegram',    g('telegram'));
  s.setAttribute('data-line',        g('line'));
  s.setAttribute('data-instagram',   g('instagram'));
  s.setAttribute('data-email',       g('email'));

  s.onload = function () {
    // Let the widget fully initialize, then open it
    setTimeout(function () {
      var btn = document.getElementById('_ocw_btn');
      if (btn) btn.click();

      // Wire close button to notify React Native
      setTimeout(function () {
        var closeBtn = document.getElementById('_ocw_close');
        if (closeBtn) {
          closeBtn.addEventListener('click', function () {
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'close' }));
            }
          });
        }
      }, 200);
    }, 400);
  };

  s.src = window.location.origin + '/widget.js';
  document.body.appendChild(s);
})();
</script>
</body>
</html>
