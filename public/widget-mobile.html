<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OPSConnect Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f7f8fc; }

    /* Root fills entire screen */
    #_oc_widget_root {
      position: fixed !important;
      top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: stretch !important;
    }

    /* Hide floating button */
    #_ocw_btn { display: none !important; }

    /* Panel fills entire screen */
    #_ocw_panel,
    #_ocw_panel.open {
      position: fixed !important;
      top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      width: 100% !important;
      max-width: 100% !important;
      height: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }

    /*
     * CRITICAL iOS FIX: flex children with overflow:hidden default to
     * min-height:auto, which prevents them from shrinking correctly.
     * Without min-height:0, the messages div has 0 effective height
     * and all chat bubbles are clipped / invisible.
     */
    #_ocw_body,
    #_ocw_main,
    #_ocw_ai,
    #_ocw_lv,
    #_ocw_ai_msgs,
    #_ocw_lv_chat,
    #_ocw_lv_msgs {
      min-height: 0 !important;
    }

    /* iOS momentum scrolling for chat areas */
    #_ocw_ai_msgs,
    #_ocw_lv_msgs,
    #_ocw_sb,
    #_ocw_lang_list {
      -webkit-overflow-scrolling: touch !important;
    }

    /* Keep close button visible so user can go back */
    #_ocw_close { display: flex !important; }
  </style>
</head>
<body>
<script>
(function () {
  var p = new URLSearchParams(window.location.search);
  function g(k, d) { return p.get(k) || d || ''; }

  /* Suppress auto-focus on iOS — prevents keyboard from popping up
     on the programmatic .focus() call inside the widget greeting callback. */
  var _origFocus = HTMLElement.prototype.focus;
  HTMLElement.prototype.focus = function (opts) {
    if (this.id === '_ocw_ai_inp' || this.id === '_ocw_lv_inp') {
      /* Only focus when triggered by a real user touch, not programmatic calls */
      if (!window._oc_userActive) return;
    }
    _origFocus.call(this, opts);
  };
  document.addEventListener('touchstart', function () { window._oc_userActive = true; }, { passive: true });
  document.addEventListener('touchend',   function () {
    setTimeout(function () { window._oc_userActive = false; }, 300);
  }, { passive: true });

  // Build and inject widget script tag
  var s = document.createElement('script');
  s.setAttribute('data-partner-id',  g('partner_id'));
  s.setAttribute('data-name',        g('name', 'Support'));
  s.setAttribute('data-avatar',      g('avatar', '?'));
  s.setAttribute('data-logo',        g('logo'));
  s.setAttribute('data-color-from',  g('color_from', '#24396D'));
  s.setAttribute('data-color-to',    g('color_to',   '#38BDEB'));
  s.setAttribute('data-api',         g('api'));
  s.setAttribute('data-lang',        g('lang'));
  s.setAttribute('data-messenger',   g('messenger'));
  s.setAttribute('data-whatsapp',    g('whatsapp'));
  s.setAttribute('data-telegram',    g('telegram'));
  s.setAttribute('data-line',        g('line'));
  s.setAttribute('data-instagram',   g('instagram'));
  s.setAttribute('data-email',       g('email'));

  s.onload = function () {
    // 500ms gives the widget JS time to create all DOM elements
    setTimeout(function () {
      var btn = document.getElementById('_ocw_btn');
      if (btn) btn.click();

      // Wire close button → notify React Native host
      setTimeout(function () {
        var closeBtn = document.getElementById('_ocw_close');
        if (closeBtn) {
          closeBtn.addEventListener('click', function () {
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'close' }));
            }
          });
        }
      }, 300);
    }, 500);
  };

  s.src = window.location.origin + '/widget.js';
  document.body.appendChild(s);
})();
</script>
</body>
</html>
