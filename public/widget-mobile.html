<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OPSConnect Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }

    /* Force the widget to fill the screen instead of floating */
    #_oc_widget_root {
      position: fixed !important;
      bottom: 0 !important; right: 0 !important;
      top: 0 !important; left: 0 !important;
      z-index: 9999 !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 0 !important;
    }
    #_ocw_btn { display: none !important; }
    #_ocw_panel {
      display: flex !important;
      width: 100% !important;
      max-width: 100% !important;
      height: 100% !important;
      max-height: 100% !important;
      border-radius: 0 !important;
      box-shadow: none !important;
    }
    /* Hide close button — mobile app handles navigation */
    #_ocw_close { display: none !important; }
  </style>
</head>
<body>
<script>
  // Read config from URL query params
  (function () {
    var p = new URLSearchParams(window.location.search);
    function g(k, d) { return p.get(k) || d || ''; }

    var s = document.createElement('script');
    s.setAttribute('data-partner-id',  g('partner_id'));
    s.setAttribute('data-name',        g('name', 'Support'));
    s.setAttribute('data-avatar',      g('avatar', '?'));
    s.setAttribute('data-logo',        g('logo'));
    s.setAttribute('data-color-from',  g('color_from', '#24396D'));
    s.setAttribute('data-color-to',    g('color_to',   '#38BDEB'));
    s.setAttribute('data-api',         g('api'));
    s.setAttribute('data-lang',        g('lang'));
    s.setAttribute('data-messenger',   g('messenger'));
    s.setAttribute('data-whatsapp',    g('whatsapp'));
    s.setAttribute('data-telegram',    g('telegram'));
    s.setAttribute('data-line',        g('line'));
    s.setAttribute('data-instagram',   g('instagram'));
    s.setAttribute('data-email',       g('email'));
    s.src = window.location.origin + '/widget.js';
    document.body.appendChild(s);
  })();
</script>
</body>
</html>
