<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #24396D;
      --c2: #38BDEB;
      --grad: linear-gradient(135deg, var(--c1), var(--c2));
    }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Kantumruy Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #f7f8fc;
    }

    /* ── App shell ── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      height: -webkit-fill-available;
    }

    /* ── Header ── */
    #hdr {
      background: var(--grad);
      padding: 13px 16px;
      padding-top: max(13px, env(safe-area-inset-top, 13px));
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #hdr-ava {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; color: #fff;
      overflow: hidden; flex-shrink: 0;
    }
    #hdr-ava img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    #hdr-info { flex: 1; min-width: 0; }
    #hdr-name { color: #fff; font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #hdr-sub  {
      font-size: 11px; color: rgba(255,255,255,.85); margin-top: 1px;
      display: flex; align-items: center; gap: 4px;
    }
    #hdr-sub::before { content: ''; width: 6px; height: 6px; background: #4ade80; border-radius: 50%; flex-shrink: 0; }
    .hdr-btn {
      background: none; border: none;
      color: rgba(255,255,255,.75); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      padding: 4px; border-radius: 8px; flex-shrink: 0;
      font-size: 22px; line-height: 1;
    }

    /* ── Body (sidebar + main) ── */
    #body {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Sidebar ── */
    #sb {
      width: 54px;
      border-right: 1px solid #efefef;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 2px;
      background: #f9f9fb;
      flex-shrink: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
    }
    .sbi {
      width: 40px; height: 40px; border-radius: 11px;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #b0b8c4; text-decoration: none;
      background: transparent;
      transition: all .15s;
      flex-shrink: 0;
    }
    .sbi:hover, .sbi.active { background: var(--c1); color: #fff; }
    .sbi svg { pointer-events: none; }
    .sbd { width: 30px; height: 1px; background: #e8eaed; margin: 5px 0; flex-shrink: 0; }

    /* ── Main area ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      min-width: 0;
    }

    /* ── Panels ── */
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .panel.hidden { display: none !important; }

    /* ── Messages ── */
    .msgs {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #f7f8fc;
      min-height: 0;
    }
    .msg-bot {
      background: #fff; color: #1f2937;
      padding: 9px 13px;
      border-radius: 16px 16px 16px 4px;
      font-size: 13px; line-height: 1.5;
      max-width: 90%;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      align-self: flex-start;
      white-space: pre-wrap; word-wrap: break-word;
    }
    .msg-user {
      background: var(--grad); color: #fff;
      padding: 9px 13px;
      border-radius: 16px 16px 4px 16px;
      font-size: 13px; line-height: 1.5;
      max-width: 90%;
      align-self: flex-end;
      white-space: pre-wrap; word-wrap: break-word;
    }
    .msg-sys {
      align-self: center; font-size: 11px; color: #9ca3af;
      text-align: center; padding: 2px 0;
    }

    /* Typing dots */
    .dots {
      display: flex; gap: 4px; align-items: center;
      padding: 10px 13px; background: #fff;
      border-radius: 16px 16px 16px 4px;
      align-self: flex-start;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .dots span {
      width: 6px; height: 6px; background: #bbb; border-radius: 50%;
      animation: dot 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot {
      0%,80%,100% { transform: scale(.8); opacity: .5; }
      40%          { transform: scale(1.2); opacity: 1; }
    }

    /* ── Chips ── */
    #chips {
      display: none;
      flex-wrap: wrap;
      gap: 5px;
      padding: 5px 12px 8px;
      background: #f7f8fc;
      border-top: 1px solid #eef0f3;
      flex-shrink: 0;
    }
    .chip {
      padding: 4px 10px;
      border-radius: 14px;
      border: 1.5px solid var(--c1);
      color: var(--c1);
      background: #fff;
      font-size: 11px; font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: all .15s;
    }
    .chip:hover, .chip.active { background: var(--c1); color: #fff; }

    /* ── Footer ── */
    .ftr {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
      border-top: 1px solid #e8eaed;
      background: #fff;
      flex-shrink: 0;
    }
    .inp {
      flex: 1;
      border: 1.5px solid #e5e7eb;
      border-radius: 22px;
      padding: 8px 14px;
      font-size: 13px;
      background: #f9fafb; color: #111;
      font-family: inherit;
      outline: none;
      transition: border .2s;
    }
    .inp:focus  { border-color: var(--c1); }
    .inp:disabled { opacity: .6; }
    .snd {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--grad);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .2s;
    }
    .snd:disabled { opacity: .4; cursor: default; }

    /* ── Live idle screen ── */
    #lv-idle {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 24px; text-align: center; gap: 14px;
      background: #f7f8fc;
    }
    #lv-idle .ico {
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.15); color: #fff;
    }
    #lv-idle h3 { font-size: 15px; font-weight: 700; color: #111827; }
    #lv-idle p  { font-size: 12px; color: #6b7280; line-height: 1.6; max-width: 200px; }
    #lv-connect {
      padding: 10px 24px; border-radius: 22px;
      background: var(--grad); color: #fff;
      border: none; cursor: pointer; font-size: 13px; font-weight: 600;
      font-family: inherit;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="hdr">
    <div id="hdr-ava"></div>
    <div id="hdr-info">
      <div id="hdr-name">Support</div>
      <div id="hdr-sub" id="hdr-sub">AI Assistant · Online now</div>
    </div>
    <button class="hdr-btn" id="btn-lang" title="Language" aria-label="Language">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2s.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2s.07-1.35.16-2h4.68c.09.65.16 1.32.16 2s-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2s-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
    </button>
    <button class="hdr-btn" id="btn-close" title="Close" aria-label="Close">&times;</button>
  </div>

  <!-- Body -->
  <div id="body">

    <!-- Sidebar -->
    <nav id="sb">
      <button class="sbi active" id="tab-ai" title="AI Chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      </button>
      <button class="sbi" id="tab-lv" title="Live Agent">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h1v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-2v8h1c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/></svg>
      </button>
      <div id="sb-channels"></div>
    </nav>

    <!-- Main -->
    <div id="main">

      <!-- AI Panel -->
      <div class="panel" id="panel-ai">
        <div class="msgs" id="ai-msgs"></div>
        <div id="chips"></div>
        <div class="ftr">
          <input class="inp" id="ai-inp" type="text" placeholder="Ask me anything…" maxlength="500" disabled />
          <button class="snd" id="ai-snd" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>

      <!-- Live Panel -->
      <div class="panel hidden" id="panel-lv">
        <!-- Idle state -->
        <div id="lv-idle">
          <div class="ico">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1c-4.97 0-9 4.03-9 9v7c0 1.66 1.34 3 3 3h1v-8H5v-2c0-3.87 3.13-7 7-7s7 3.13 7 7v2h-2v8h1c1.66 0 3-1.34 3-3v-7c0-4.97-4.03-9-9-9z"/></svg>
          </div>
          <h3 id="lv-title">Live Agent</h3>
          <p id="lv-desc">Chat with a real support agent</p>
          <button id="lv-connect">Start Live Chat</button>
        </div>
        <!-- Chat state (hidden until connected) -->
        <div class="panel hidden" id="lv-chat">
          <div class="msgs" id="lv-msgs"></div>
          <div class="ftr">
            <input class="inp" id="lv-inp" type="text" placeholder="Message the agent…" maxlength="500" disabled />
            <button class="snd" id="lv-snd" disabled>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
      </div>

    </div><!-- /main -->
  </div><!-- /body -->
</div><!-- /app -->

<script>
(function () {
  /* ── Config ── */
  var p = new URLSearchParams(location.search);
  function g(k, d) { return p.get(k) || d || ''; }
  var cfg = {
    partnerId: g('partner_id'),
    api:       g('api'),
    name:      g('name', 'Support'),
    avatar:    g('avatar', '?'),
    logo:      g('logo'),
    c1:        g('color_from', '#24396D'),
    c2:        g('color_to',   '#38BDEB'),
    messenger: g('messenger'),
    whatsapp:  g('whatsapp'),
    telegram:  g('telegram'),
    line:      g('line'),
    instagram: g('instagram'),
    email:     g('email'),
  };

  /* Apply brand colors */
  document.documentElement.style.setProperty('--c1', cfg.c1);
  document.documentElement.style.setProperty('--c2', cfg.c2);

  /* ── Header ── */
  document.querySelector('#hdr-name').textContent = cfg.name;
  var ava = document.querySelector('#hdr-ava');
  if (cfg.logo) {
    var img = document.createElement('img');
    img.src = cfg.logo; img.alt = cfg.name;
    ava.appendChild(img);
  } else {
    ava.textContent = cfg.avatar !== '?' ? cfg.avatar : cfg.name.charAt(0).toUpperCase();
  }

  /* ── Channel sidebar links ── */
  var chSVGs = {
    messenger: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 4.974 0 11.111c0 3.498 1.744 6.614 4.469 8.654V24l4.088-2.242c1.092.301 2.246.464 3.443.464 6.627 0 12-4.975 12-11.111S18.627 0 12 0zm1.191 14.963l-3.055-3.26-5.963 3.26L10.732 8l3.131 3.26L19.752 8l-6.561 6.963z"/></svg>',
    whatsapp:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>',
    telegram:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>',
    line:      '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>',
    instagram: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>',
    email:     '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>',
  };
  var chLinks = {
    messenger: 'https://m.me/',
    whatsapp:  'https://wa.me/',
    telegram:  'https://t.me/',
    line:      'https://line.me/ti/p/~',
    instagram: 'https://ig.me/m/',
    email:     'mailto:',
  };
  var sbCh = document.querySelector('#sb-channels');
  var hasChannels = false;
  ['messenger','whatsapp','telegram','line','instagram','email'].forEach(function(k) {
    if (!cfg[k]) return;
    if (!hasChannels) { sbCh.innerHTML = '<div class="sbd"></div>'; hasChannels = true; }
    var a = document.createElement('a');
    a.className = 'sbi';
    a.href = chLinks[k] + cfg[k];
    a.target = '_blank'; a.rel = 'noopener';
    a.title = k.charAt(0).toUpperCase() + k.slice(1);
    a.innerHTML = chSVGs[k];
    sbCh.appendChild(a);
  });

  /* ── State ── */
  var aiHistory  = [];
  var aiBusy     = false;
  var lvStep     = 'idle';  /* idle | ask_name | ask_contact | live */
  var visName    = '';
  var visContact = '';
  var chatId     = null;
  var pollTimer  = null;
  var pollSince  = null;
  var activeTab  = 'ai';

  /* ── DOM refs ── */
  var aiMsgs  = document.querySelector('#ai-msgs');
  var aiInp   = document.querySelector('#ai-inp');
  var aiSnd   = document.querySelector('#ai-snd');
  var chipsEl = document.querySelector('#chips');
  var panelAi = document.querySelector('#panel-ai');
  var panelLv = document.querySelector('#panel-lv');
  var lvIdle  = document.querySelector('#lv-idle');
  var lvChat  = document.querySelector('#lv-chat');
  var lvMsgs  = document.querySelector('#lv-msgs');
  var lvInp   = document.querySelector('#lv-inp');
  var lvSnd   = document.querySelector('#lv-snd');

  /* ── Helpers ── */
  function scrollEnd(el) { el.scrollTop = el.scrollHeight; }

  function addMsg(container, text, cls) {
    var d = document.createElement('div');
    d.className = cls;
    d.textContent = text;
    container.appendChild(d);
    scrollEnd(container);
    return d;
  }

  function showDots(container) {
    var d = document.createElement('div');
    d.className = 'dots';
    d.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(d);
    scrollEnd(container);
    return d;
  }

  function botSay(container, text, ms) {
    return new Promise(function (ok) {
      var d = showDots(container);
      setTimeout(function () { d.remove(); addMsg(container, text, 'msg-bot'); ok(); }, ms || 750);
    });
  }

  function setAiReady(on) {
    aiBusy = !on;
    aiInp.disabled = !on;
    aiSnd.disabled = !on;
  }

  function setLvReady(on) {
    lvInp.disabled = !on;
    lvSnd.disabled = !on;
  }

  /* ── Tab switching ── */
  function switchTab(tab) {
    activeTab = tab;
    document.querySelector('#tab-ai').classList.toggle('active', tab === 'ai');
    document.querySelector('#tab-lv').classList.toggle('active', tab === 'lv');
    panelAi.classList.toggle('hidden', tab !== 'ai');
    panelLv.classList.toggle('hidden', tab !== 'lv');

    if (tab === 'lv' && lvStep === 'idle') startLiveFlow();
  }

  document.querySelector('#tab-ai').addEventListener('click', function () { switchTab('ai'); });
  document.querySelector('#tab-lv').addEventListener('click', function () { switchTab('lv'); });
  document.querySelector('#lv-connect').addEventListener('click', startLiveFlow);
  document.querySelector('#btn-close').addEventListener('click', function () {
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'close' }));
    }
  });

  /* ── Topic chips ── */
  function loadTopics() {
    if (!cfg.api || !cfg.partnerId) return;
    fetch(cfg.api + '/widget-init?partner_id=' + encodeURIComponent(cfg.partnerId))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var topics = data.topics || [];
        if (!topics.length) return;
        chipsEl.innerHTML = '';
        var activeChip = null;
        topics.forEach(function (topic) {
          var label   = typeof topic === 'string' ? topic : topic.label;
          var content = typeof topic === 'string' ? null  : topic.content;
          var btn = document.createElement('button');
          btn.className = 'chip';
          btn.textContent = label;
          btn.addEventListener('click', function () {
            if (activeChip) activeChip.classList.remove('active');
            activeChip = btn; btn.classList.add('active');
            addMsg(aiMsgs, label, 'msg-user');
            if (content) {
              var d = showDots(aiMsgs);
              setTimeout(function () { d.remove(); addMsg(aiMsgs, content, 'msg-bot'); }, 600);
            }
          });
          chipsEl.appendChild(btn);
        });
        chipsEl.style.display = 'flex';
      })
      .catch(function () {});
  }

  /* ── AI chat ── */
  function sendAI() {
    var txt = aiInp.value.trim();
    if (!txt || aiBusy) return;
    addMsg(aiMsgs, txt, 'msg-user');
    aiInp.value = '';
    setAiReady(false);
    var snap = aiHistory.slice();
    aiHistory.push({ role: 'user', content: txt });
    var d = showDots(aiMsgs);
    fetch(cfg.api + '/ai-chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ partner_id: cfg.partnerId, message: txt, history: snap }),
    })
    .then(function (r) { if (!r.ok) throw r; return r.json(); })
    .then(function (data) {
      d.remove();
      var reply = data.reply || 'Sorry, I could not process that.';
      aiHistory.push({ role: 'assistant', content: reply });
      addMsg(aiMsgs, reply, 'msg-bot');
      setAiReady(true);
      if (data.collect_info) { setTimeout(function () { switchTab('lv'); }, 900); }
    })
    .catch(function () {
      d.remove();
      addMsg(aiMsgs, 'Something went wrong. Please try again.', 'msg-bot');
      setAiReady(true);
    });
  }

  aiSnd.addEventListener('click', sendAI);
  aiInp.addEventListener('keydown', function (e) { if (e.key === 'Enter') sendAI(); });

  /* ── Live chat flow ── */
  function startLiveFlow() {
    if (lvStep !== 'idle') return;
    lvStep = 'ask_name';
    lvIdle.style.display = 'none';
    lvChat.classList.remove('hidden');
    setLvReady(false);
    botSay(lvMsgs, 'I\'ll connect you with a live agent.\n\nWhat\'s your name?')
      .then(function () { setLvReady(true); lvInp.placeholder = 'Enter your name…'; });
  }

  function sendLv() {
    var txt = lvInp.value.trim();
    if (!txt) return;

    if (lvStep === 'ask_name') {
      visName = txt;
      addMsg(lvMsgs, txt, 'msg-user');
      lvInp.value = '';
      lvStep = 'ask_contact';
      setLvReady(false);
      botSay(lvMsgs, 'Thanks ' + visName + '! What\'s your phone or email?')
        .then(function () { setLvReady(true); lvInp.placeholder = 'Phone or email…'; });

    } else if (lvStep === 'ask_contact') {
      visContact = txt;
      addMsg(lvMsgs, txt, 'msg-user');
      lvInp.value = '';
      lvStep = 'connecting';
      setLvReady(false);
      var d = showDots(lvMsgs);
      fetch(cfg.api + '/live-chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          action:          'start',
          partner_id:      cfg.partnerId,
          visitor_name:    visName,
          visitor_contact: visContact,
          initial_message: aiHistory.length ? aiHistory[aiHistory.length - 1].content : '',
          ai_history:      aiHistory,
        }),
      })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        d.remove();
        chatId = data.chat_id;
        lvStep = 'live';
        addMsg(lvMsgs, 'Connected! An agent will reply shortly.', 'msg-sys');
        lvInp.placeholder = 'Message the agent…';
        setLvReady(true);
        pollTimer = setInterval(poll, 3000);
      })
      .catch(function () {
        d.remove();
        addMsg(lvMsgs, 'Connection failed. Please try again.', 'msg-sys');
        lvStep = 'idle';
        lvIdle.style.display = 'flex';
        lvChat.classList.add('hidden');
      });

    } else if (lvStep === 'live') {
      addMsg(lvMsgs, txt, 'msg-user');
      lvInp.value = '';
      fetch(cfg.api + '/live-chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ action: 'message', chat_id: chatId, content: txt, visitor_name: visName }),
      }).catch(function () {});
    }
  }

  function poll() {
    if (!chatId) return;
    var url = cfg.api + '/live-chat?action=poll&chat_id=' + chatId;
    if (pollSince) url += '&since=' + encodeURIComponent(pollSince);
    fetch(url)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data.messages || !data.messages.length) return;
        data.messages.forEach(function (m) {
          addMsg(lvMsgs, (m.sender_name || 'Agent') + ': ' + m.content, 'msg-bot');
        });
        pollSince = data.messages[data.messages.length - 1].created_at;
      })
      .catch(function () {});
  }

  lvSnd.addEventListener('click', sendLv);
  lvInp.addEventListener('keydown', function (e) { if (e.key === 'Enter') sendLv(); });

  /* ── Boot ── */
  loadTopics();
  botSay(aiMsgs, 'Hi! I\'m the AI assistant for ' + cfg.name + '. How can I help you today?')
    .then(function () { setAiReady(true); });
})();
</script>
</body>
</html>
